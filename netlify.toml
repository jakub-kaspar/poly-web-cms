[build]
  command   = "npm run build"
  publish   = "_site"

[build.environment]
  NODE_VERSION = "20"

# Required for Netlify Identity / Decap CMS auth callback
[[redirects]]
  from = "/admin/"
  to   = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
