[build]
  command   = "npm run build"
  publish   = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Admin root → dashboard
[[redirects]]
  from = "/admin/"
  to   = "/admin/dashboard.html"
  status = 302

# CMS entry point (Netlify Identity callback still works here)
[[redirects]]
  from = "/admin/cms/"
  to   = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
